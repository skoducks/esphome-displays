# Precipitation chance - comes from NWS instead of met.no
- trigger:
    - platform: time_pattern
      hours: "/1"
    - platform: homeassistant
      event: start
  action:
    - service: weather.get_forecasts
      data:
        type: twice_daily
      target:
        entity_id: weather.kpdx
      response_variable: forecast_data
  sensor:
    # Day 0 (Today - all entries matching today's date)
    - name: "Forecast Day 0 Precip Chance"
      unique_id: forecast_day0_precip_chance
      state: >
        {% set ns = namespace(today_precip=[]) %}
        {% set today = now().date() %}
        {% for item in forecast_data['weather.kpdx'].forecast %}
          {% set forecast_date = (item.datetime | as_datetime).date() %}
          {% if forecast_date == today %}
            {% set ns.today_precip = ns.today_precip + [item.precipitation_probability | float(0)] %}
          {% endif %}
        {% endfor %}
        {{ ns.today_precip | max if ns.today_precip else 0 }}
      unit_of_measurement: "%"
    
    # Day 1 (Tomorrow)
    - name: "Forecast Day 1 Precip Chance"
      unique_id: forecast_day1_precip_chance
      state: >
        {% set ns = namespace(precip=[]) %}
        {% set target_date = (now() + timedelta(days=1)).date() %}
        {% for item in forecast_data['weather.kpdx'].forecast %}
          {% set forecast_date = (item.datetime | as_datetime).date() %}
          {% if forecast_date == target_date %}
            {% set ns.precip = ns.precip + [item.precipitation_probability | float(0)] %}
          {% endif %}
        {% endfor %}
        {{ ns.precip | max if ns.precip else 0 }}
      unit_of_measurement: "%"
    
    # Day 2
