# Trigger-based sensors - In configuration.yaml I have 'template: !include_dir_merge_list templates/'
## weather.kpdx is NWS, forecast_home is met.no
- trigger:
    - platform: time_pattern
      hours: "/2"  # Update every 2 hours
    - platform: homeassistant
      event: start
  action:
    - service: weather.get_forecasts
      data:
        type: daily
      target:
        entity_id: weather.forecast_home
      response_variable: daily
  sensor:
    - name: "Forecast High"
      unique_id: forecast_high
      state: "{{ daily['weather.forecast_home'].forecast[0].temperature }}"
      unit_of_measurement: "°F"
      
    - name: "Forecast Low"
      unique_id: forecast_low
      state: "{{ daily['weather.forecast_home'].forecast[0].templow }}"
      unit_of_measurement: "°F"

    - name: "Forecast Day 0 Precip Inches"
      unique_id: forecast_day0_precip_inches
      state: "{{ daily['weather.forecast_home'].forecast[0].precipitation | round(1) }}"
      unit_of_measurement: "in"
      device_class: precipitation
      
# Regular template sensors (updates on state change)
- sensor:
    - name: "Forecast Current Temp"
      unique_id: forecast_current_temp
      state: "{{ state_attr('weather.forecast_home', 'temperature') }}"
      unit_of_measurement: "°F"
      
    - name: "Forecast Current Wind"
      unique_id: forecast_current_wind
      state: "{{ state_attr('weather.forecast_home', 'wind_speed') | round(0) }}"
      unit_of_measurement: "mph"
      
    - name: "Forecast Condition"
      unique_id: forecast_condition
      state: "{{ states('weather.forecast_home') }}"

    - name: "Forecast Condition Name"
      unique_id: forecast_condition_name
      state: >
        {% set condition = states('weather.forecast_home') %}
        {% if condition == 'partlycloudy' %}Partly Cloudy
        {% elif condition == 'cloudy' %}Cloudy
        {% elif condition == 'sunny' %}Sunny
        {% elif condition == 'clear-night' %}Clear
        {% elif condition == 'rainy' %}Rainy
        {% elif condition == 'snowy' %}Snowy
        {% elif condition == 'fog' %}Foggy
        {% elif condition == 'windy' %}Windy
        {% elif condition == 'pouring' %}Pouring
        {% elif condition == 'lightning' %}Lightning
        {% elif condition == 'lightning-rainy' %}Lightning & Rain
        {% elif condition == 'hail' %}Hail
        {% elif condition == 'snowy-rainy' %}Snowy & Rainy
        {% else %}{{ condition | title }}
        {% endif %}

- sensor:
    - name: "Forecast Day 0 Date"
      unique_id: forecast_day0_date
      state: "{{ now().strftime('%a') }}"  # Shows "Fri", "Sat", etc.
    
    - name: "Forecast Day 1 Date"
      unique_id: forecast_day1_date
      state: "{{ (now() + timedelta(days=1)).strftime('%a') }}"
    
    - name: "Forecast Day 2 Date"
      unique_id: forecast_day2_date
      state: "{{ (now() + timedelta(days=2)).strftime('%a') }}"
    
    - name: "Forecast Day 3 Date"
      unique_id: forecast_day3_date
      state: "{{ (now() + timedelta(days=3)).strftime('%a') }}"
    
    - name: "Forecast Day 4 Date"
      unique_id: forecast_day4_date
      state: "{{ (now() + timedelta(days=4)).strftime('%a') }}"
     

